name: CD

on:
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: alanbalfonso
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: Homelab-Cluster-Monitor
  HELM_RELEASE: hcm
  K8S_NAMESPACE: homelab-cluster-monitor

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/hcm-backend:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/hcm-frontend:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Build and push simulator image
        uses: docker/build-push-action@v6
        with:
          context: ./simulator
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/hcm-simulator:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} helm/hcm \
            -n ${{ env.K8S_NAMESPACE }} \
            --create-namespace \
            -f helm/hcm/values-prod.yaml \
            --set images.backend.repository=${{ env.DOCKERHUB_USERNAME }}/hcm-backend \
            --set images.backend.tag=${{ steps.vars.outputs.IMAGE_TAG }} \
            --set images.frontend.repository=${{ env.DOCKERHUB_USERNAME }}/hcm-frontend \
            --set images.frontend.tag=${{ steps.vars.outputs.IMAGE_TAG }} \
            --set images.simulator.repository=${{ env.DOCKERHUB_USERNAME }}/hcm-simulator \
            --set images.simulator.tag=${{ steps.vars.outputs.IMAGE_TAG }}
