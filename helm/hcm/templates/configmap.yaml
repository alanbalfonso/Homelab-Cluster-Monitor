apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hcm.fullname" . }}-config
  namespace: {{ include "hcm.namespace" . }}
data:
  DB_HOST: {{ .Values.config.DB_HOST | quote }}
  DB_PORT: {{ .Values.config.DB_PORT | quote }}
  DB_NAME: {{ .Values.config.DB_NAME | quote }}
  DB_USER: {{ .Values.config.DB_USER | quote }}
  POSTGRES_DB: {{ .Values.config.POSTGRES_DB | quote }}
  POSTGRES_USER: {{ .Values.config.POSTGRES_USER | quote }}
  PORT: {{ .Values.config.PORT | quote }}
  NODE_ENV: {{ .Values.config.NODE_ENV | quote }}
  BACKEND_URL: {{ .Values.config.BACKEND_URL | quote }}
  METRICS_INTERVAL: {{ .Values.config.METRICS_INTERVAL | quote }}
