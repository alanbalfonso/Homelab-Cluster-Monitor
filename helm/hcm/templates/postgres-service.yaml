apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ include "hcm.namespace" . }}
spec:
  selector:
    app: {{ include "hcm.fullname" . }}-postgres
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.port }}
  type: ClusterIP
